version: '3.8'

services:
  backend:
    build: ./backend
    container_name: lingovoyage_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: lingovoyage_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
